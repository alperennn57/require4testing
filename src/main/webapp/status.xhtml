<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Statusübersicht</title>
</h:head>
<h:body>
    <h1>Statusübersicht</h1>

    <h:dataTable value="#{statusBean.testRuns}" var="tr" border="1">
        <h:column>
            <f:facet name="header">Name</f:facet>
            #{tr.name}
        </h:column>
        <h:column>
            <f:facet name="header">Testername</f:facet>
            #{tr.testerName}
        </h:column>
        <h:column>
            <f:facet name="header">Status</f:facet>
            #{tr.status}
        </h:column>
    </h:dataTable>

    <br />
    <h:link outcome="index.xhtml" value="Zurück zur Startseite" />
</h:body>
</html>
