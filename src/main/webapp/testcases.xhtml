<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Testfälle</title>
</h:head>
<h:body>
    <h1>Testfälle verwalten</h1>

    <h:form>
        <h:panelGrid columns="2">
            <h:outputLabel for="title" value="Titel:" />
            <h:inputText id="title" value="#{testCaseBean.testCase.title}" />

            <h:outputLabel for="description" value="Beschreibung:" />
            <h:inputTextarea id="description" value="#{testCaseBean.testCase.description}" />

            <h:outputLabel for="expectedResult" value="Erwartetes Ergebnis:" />
            <h:inputTextarea id="expectedResult" value="#{testCaseBean.testCase.expectedResult}" />

            <h:outputLabel for="requirement" value="Anforderung:" />
			<h:selectOneMenu id="requirement" value="#{testCaseBean.selectedRequirementId}">
			    <f:selectItems value="#{testCaseBean.requirements}"
			                   var="req"
			                   itemValue="#{req.id}"
			                   itemLabel="#{req.title}" />
			</h:selectOneMenu>
        </h:panelGrid>

        <br />
        <h:commandButton value="Testfall speichern" action="#{testCaseBean.saveTestCase}" />
    </h:form>

    <h2>Vorhandene Testfälle</h2>
    <h:dataTable value="#{testCaseBean.testCases}" var="tc" border="1">
        <h:column>
            <f:facet name="header">Titel</f:facet>
            #{tc.title}
        </h:column>
        <h:column>
            <f:facet name="header">Beschreibung</f:facet>
            #{tc.description}
        </h:column>
        <h:column>
            <f:facet name="header">Erwartetes Ergebnis</f:facet>
            #{tc.expectedResult}
        </h:column>
        <h:column>
            <f:facet name="header">Anforderung</f:facet>
            #{tc.requirement.title}
        </h:column>
    </h:dataTable>

    <br />
    <h:link outcome="index.xhtml" value="Zurück zur Startseite" />
</h:body>
</html>
